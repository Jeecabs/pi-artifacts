  <script>
    const form = document.querySelector("#unlock-form");
    const input = document.querySelector("#password");
    const button = document.querySelector("#unlock");
    const status = document.querySelector("#status");
    const payload = JSON.parse(document.querySelector("#encrypted-artifact").textContent);
    const decodeBase64 = (value) => Uint8Array.from(atob(value), (character) => character.charCodeAt(0));

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      status.textContent = "Decrypting…";

      try {
        const material = await crypto.subtle.importKey(
          "raw",
          new TextEncoder().encode(input.value),
          "PBKDF2",
          false,
          ["deriveKey"],
        );
        const key = await crypto.subtle.deriveKey(
          { name: "PBKDF2", hash: "SHA-256", salt: decodeBase64(payload.salt), iterations: payload.iterations },
          material,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"],
        );
        const plaintext = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: decodeBase64(payload.iv) },
          key,
          decodeBase64(payload.ciphertext),
        );
        const html = new TextDecoder().decode(plaintext);
        input.value = "";
        document.open();
        document.write(html);
        document.close();
      } catch {
        status.textContent = "Wrong password or damaged artifact.";
        button.disabled = false;
        input.select();
      }
    });
  </script>
